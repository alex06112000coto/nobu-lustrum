<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>Wachtwoord Vergeten - Nobu Lustrumreis</title>
  <link rel="stylesheet" href="index.css">
  <style>
    html, body {
      overflow-y: auto !important;
      height: auto !important;
    }
    .auth-container { max-width: 400px; margin: 40px auto; padding: 24px; background: var(--bg-card); border-radius: var(--border-radius); box-shadow: var(--shadow); }
    .auth-container h2 { text-align: center; margin-bottom: 8px; }
    .auth-container p.subtitle { text-align: center; margin-bottom: 16px; }
  </style>
</head>
<body>
  <section class="view-section active">
    <div class="auth-container">
      <img src="nobu logo.jpg" alt="Nobu Logo" class="auth-logo" style="display:block;margin:auto;width:80px;height:80px;object-fit:cover;">
      <h2>Wachtwoord herstellen</h2>
      <p class="subtitle">Vul je e-mailadres in om een herstellink te ontvangen</p>
      
      <form id="reset-form">
        <div class="input-group">
          <label for="reset-email">E-mailadres</label>
          <input type="email" id="reset-email" required autocomplete="email" placeholder="naam@voorbeeld.nl">
        </div>
        
        <div id="reset-success-msg" style="color: var(--primary); font-size: 0.85rem; margin-bottom:12px; display:none; background: rgba(0, 232, 0, 0.1); padding: 10px; border-radius: var(--border-radius-sm); border: 1px solid var(--primary); line-height: 1.4;"></div>
        <div id="reset-error-msg" style="color: var(--danger); font-size: 0.85rem; margin-bottom:12px; display:none;"></div>
        
        <button type="submit" class="btn-primary" style="width:100%; margin-top:8px;">Verstuur Herstellink</button>
      </form>
      
      <p style="text-align:center; margin-top:16px; font-size:0.85rem; color:var(--text-muted);">
        Terug naar <a href="index.html" style="color: var(--primary); text-decoration:none; font-weight:600;">Inloggen</a>
      </p>
    </div>
  </section>

  <script type="module">
    import { auth } from './js/firebase-config.js?v=19';
    import { sendPasswordResetEmail } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
    
    const form = document.getElementById('reset-form');
    const successMsg = document.getElementById('reset-success-msg');
    const errorMsg = document.getElementById('reset-error-msg');
    
    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      successMsg.style.display = 'none';
      errorMsg.style.display = 'none';
      
      const email = document.getElementById('reset-email').value.trim();
      console.log('Sending password reset email to:', email);
      
      try {
        await sendPasswordResetEmail(auth, email);
        console.log('Password reset email sent successfully!');
        successMsg.textContent = "Er is een link verstuurd naar " + email + ". Controleer je inbox (en eventueel je spambox) om je wachtwoord te resetten.";
        successMsg.style.display = 'block';
        form.reset();
      } catch (err) {
        console.error('Password reset error:', err);
        let friendlyMessage = "Er is iets misgegaan. Probeer het opnieuw.";
        if (err.code === "auth/user-not-found") {
          friendlyMessage = "Er is geen account bekend met dit e-mailadres.";
        } else if (err.code === "auth/invalid-email") {
          friendlyMessage = "Dit is geen geldig e-mailadres.";
        }
        errorMsg.textContent = friendlyMessage;
        errorMsg.style.display = 'block';
      }
    });
  </script>
</body>
</html>
