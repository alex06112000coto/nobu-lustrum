<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>Maak een account - Nobu Lustrumreis</title>
  <link rel="stylesheet" href="index.css">
  <style>
    html, body {
      overflow-y: auto !important;
      height: auto !important;
    }
    .auth-container { max-width: 400px; margin: 40px auto; padding: 24px; background: var(--bg-card); border-radius: var(--border-radius); box-shadow: var(--shadow); }
    .auth-container h2 { text-align: center; margin-bottom: 8px; }
    .auth-container p.subtitle { text-align: center; margin-bottom: 16px; }
  </style>
  <!-- Remove duplicate compat scripts and import from firebase-config.js instead -->
</head>
<body>
  <section class="view-section active">
    <div class="auth-container">
      <img src="nobu logo.jpg" alt="Nobu Logo" class="auth-logo" style="display:block;margin:auto;width:80px;height:80px;object-fit:cover;">
      <h2>Account maken</h2>
      <p class="subtitle">Meld je aan voor het Lustrum</p>
      <form id="signup-form">
        <div class="input-group">
          <label for="signup-invite">Uitnodigingscode (Admin Code)</label>
          <input type="text" id="signup-invite" required placeholder="Lustrumcode" style="border-color: var(--accent);">
        </div>
        <div class="input-group">
          <label for="signup-fullname">Volledige Naam</label>
          <input type="text" id="signup-fullname" required placeholder="Voornaam Achternaam">
        </div>
        <div class="input-group">
          <label for="signup-nickname">Bijnaam</label>
          <input type="text" id="signup-nickname" required placeholder="Bijvoorbeeld: Sjaak">
        </div>
        <div class="input-group">
          <label for="signup-email">E-mailadres</label>
          <input type="email" id="signup-email" required autocomplete="email" placeholder="naam@voorbeeld.nl">
        </div>
        <div class="input-group">
          <label for="signup-password">Wachtwoord (minimaal 8 tekens)</label>
          <input type="password" id="signup-password" required autocomplete="new-password" placeholder="Min. 8 tekens">
        </div>
        <div id="signup-error-msg" style="color: var(--danger); font-size: 0.85rem; margin-bottom:12px; display:none;"></div>
        <button type="submit" class="btn-primary" style="width:100%; margin-top:8px;">Registreren</button>
      </form>
      <p style="text-align:center; margin-top:16px; font-size:0.85rem; color:var(--text-muted);">
        Al een account? <a href="index.html" id="go-to-login" style="color: var(--primary); text-decoration:none; font-weight:600;">Log hier in</a>
      </p>
    </div>
  </section>

  <script type="module">
    import { auth, db } from './js/firebase-config.js?v=19';
    import { createUserWithEmailAndPassword, updateProfile } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
    import { doc, setDoc, getDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
    
    const form = document.getElementById('signup-form');
    const errorMsg = document.getElementById('signup-error-msg');
    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      console.log('Signup submit triggered');
      
      const inviteCode = document.getElementById('signup-invite').value.trim();
      const email = document.getElementById('signup-email').value.trim();
      const password = document.getElementById('signup-password').value;
      const fullName = document.getElementById('signup-fullname').value.trim();
      const nickname = document.getElementById('signup-nickname').value.trim();
      
      console.log('Collected data:', { email, fullName, nickname });
      
      if (password.length < 8) {
        errorMsg.textContent = "Wachtwoord moet minimaal 8 tekens lang zijn.";
        errorMsg.style.display = "block";
        return;
      }

      try {
        // Fetch dynamic invite code from Firestore, fallback to NOBU2026
        let validCode = "NOBU2026";
        try {
          const inviteDocRef = doc(db, "config", "invite");
          const docSnap = await getDoc(inviteDocRef);
          if (docSnap.exists() && docSnap.data().code) {
            validCode = docSnap.data().code.trim();
          }
        } catch (e) {
          console.warn("Could not load dynamic invite code from Firestore, using default:", e);
        }

        if (inviteCode.toLowerCase() !== validCode.toLowerCase()) {
          errorMsg.textContent = "Ongeldige uitnodigingscode. Vraag de lustrumcommissie om de juiste code.";
          errorMsg.style.display = "block";
          return;
        }
        // 1. Create User in Firebase Auth
        const userCredential = await createUserWithEmailAndPassword(auth, email, password);
        console.log('Firebase auth success, uid:', userCredential.user.uid);
        const user = userCredential.user;
        
        // 2. Update Auth Display Name
        await updateProfile(user, { displayName: nickname });
        
        // 3. Store Extended Profile in Firestore (Wrap in separate try-catch so security rule latency/setup doesn't freeze signup)
        try {
          const userDocRef = doc(db, "users", user.uid);
          await setDoc(userDocRef, {
            uid: user.uid,
            email: user.email,
            nickname: nickname,
            realname: fullName,
            avatarUrl: "nobu logo.jpg", // default profile picture
            createdAt: new Date().toISOString()
          });
          console.log('User profile stored in Firestore');
        } catch (firestoreErr) {
          console.warn("Firestore profile write skipped or rejected (check Firebase rules):", firestoreErr);
          // Account creation in Firebase Auth was successful, so we proceed to allow the user inside the app
        }
        
        // 4. Redirect after successful signup (auth state listener in app.js will pick up user session on index.html)
        window.location.href = 'index.html';
      } catch (err) {
        console.error('Signup error:', err);
        let friendlyMessage = err.message;
        if (err.code === "auth/email-already-in-use") {
          friendlyMessage = "Dit e-mailadres is al in gebruik.";
        } else if (err.code === "auth/invalid-email") {
          friendlyMessage = "Dit is geen geldig e-mailadres.";
        } else if (err.code === "auth/weak-password") {
          friendlyMessage = "Wachtwoord is te zwak. Gebruik minimaal 8 tekens.";
        }
        errorMsg.textContent = friendlyMessage;
        errorMsg.style.display = 'block';
      }
    });
  </script>
</body>
</html>
